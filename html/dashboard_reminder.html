<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VFLEX | Reminders</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="/vflex.css">
</head>
<body class="app-layout">
    <div class="app-bg-glow"></div>

    <aside class="app-sidebar">
        <div class="brand-section">
            <div class="brand-logo"><i class="material-icons">school</i></div>
            <span class="brand-name">VFLEX</span>
        </div>
        <nav class="nav-menu">
            <li class="nav-item"><a href="/dashboard"><i class="material-icons">dashboard</i><span>Portfolio</span></a></li>
            <li class="nav-item"><a href="/dashboard/attendance"><i class="material-icons">event_available</i><span>Attendance</span></a></li>
            <li class="nav-item"><a href="/dashboard/marks"><i class="material-icons">analytics</i><span>Assessments</span></a></li>
            <li class="nav-item"><a href="/dashboard/timetable"><i class="material-icons">schedule</i><span>Scheduler</span></a></li>
            <li class="nav-item"><a href="/dashboard/planner"><i class="material-icons">calendar_month</i><span>Planner</span></a></li>
            <li class="nav-item"><a href="/dashboard/courses"><i class="material-icons">library_books</i><span>Curriculum</span></a></li>
        </nav>
        <div style="margin-top: auto;">
            <li class="nav-item"><a href="javascript:void(0)" id="logoutBtn"><i class="material-icons">logout</i><span>Sign Out</span></a></li>
        </div>
    </aside>

    <main class="app-main">
        <header class="app-header">
            <div class="page-title"><h1>Academic Reminders</h1></div>
            <div class="user-profile" onclick="location.href='/dashboard/profile'" style="cursor: pointer;">
                <div class="user-avatar" id="userInitial">U</div>
                <div style="display: flex; flex-direction: column;">
                    <span id="userName" style="font-weight: 700; font-size: 0.9rem;">Portal User</span>
                    <span style="color: var(--accent-primary); font-size: 0.75rem; font-weight: 700;">LIVE</span>
                </div>
            </div>
        </header>

        <section class="animate-fade-in" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px;">
            <div class="dashboard-card">
                <h3 style="margin-bottom: 24px;">Quick Create</h3>
                <form id="reminderForm" style="display: flex; flex-direction: column; gap: 16px;">
                    <div class="input-group">
                        <label>Task Title</label>
                        <input type="text" id="title" placeholder="e.g. Complete Microprocessors Record" required>
                    </div>
                    <div class="input-group">
                        <label>Deadline</label>
                        <input type="datetime-local" id="remindAt" required>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 12px;">Schedule Reminder</button>
                </form>
            </div>

            <div id="reminderList" style="display: flex; flex-direction: column; gap: 16px;">
                <p style="color: var(--text-secondary); text-align: center;">Scanning for pending tasks...</p>
            </div>
        </section>
    </main>

    <script>
        async function fetchReminders() {
            try {
                const res = await fetch('/api/trackit/reminders');
                const data = await res.json();
                
                const list = document.getElementById('reminderList');
                if (data.length === 0) {
                    list.innerHTML = `<div class="dashboard-card" style="text-align: center; color: var(--text-secondary);">No active reminders. You're all caught up!</div>`;
                } else {
                    list.innerHTML = data.map(r => `
                        <div class="dashboard-card" style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: 700; font-size: 1.1rem; color: var(--accent-secondary);">${r.title}</div>
                                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">
                                    <i class="material-icons" style="font-size: 0.9rem; vertical-align: middle;">schedule</i> 
                                    ${new Date(r.remindAt).toLocaleString()}
                                </div>
                            </div>
                            <button onclick="deleteReminder('${r.id}')" style="background: none; border: none; color: var(--accent-danger); cursor: pointer;">
                                <i class="material-icons">delete_outline</i>
                            </button>
                        </div>
                    `).join('');
                }
            } catch (err) { console.error(err); }
        }

        async function deleteReminder(id) {
            await fetch(`/api/trackit/reminders/${id}`, { method: 'DELETE' });
            fetchReminders();
        }

        document.getElementById('reminderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const remindAt = document.getElementById('remindAt').value;
            
            await fetch('/api/trackit/reminders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, remindAt })
            });

            document.getElementById('reminderForm').reset();
            fetchReminders();
        });
        async function syncUser() {
             const userRes = await fetch('/api/trackit/sync/updateUserInfo', { method: 'POST' });
             const userData = await userRes.json();
             if (userData.userInfo) {
                 document.getElementById('userName').innerText = userData.userInfo.name || "User";
                 document.getElementById('userInitial').innerText = (userData.userInfo.name || "U")[0];
             }
        }
        syncUser();

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/trackit/auth/logout', { method: 'POST' });
            window.location.href = '/';
        });

        fetchReminders();
    </script>
</body>
</html>
