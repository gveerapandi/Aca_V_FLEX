<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VFLEX | Assessment Portal</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="/vflex.css">
</head>
<body class="app-layout">
    <div class="app-bg-glow"></div>

    <aside class="app-sidebar">
        <div class="brand-section">
            <div class="brand-logo"><i class="material-icons">school</i></div>
            <span class="brand-name">VFLEX</span>
        </div>
        <nav class="nav-menu">
            <li class="nav-item"><a href="/dashboard"><i class="material-icons">dashboard</i><span>Portfolio</span></a></li>
            <li class="nav-item"><a href="/dashboard/attendance"><i class="material-icons">event_available</i><span>Attendance</span></a></li>
            <li class="nav-item active"><a href="/dashboard/marks"><i class="material-icons">analytics</i><span>Assessments</span></a></li>
            <li class="nav-item"><a href="/dashboard/timetable"><i class="material-icons">schedule</i><span>Scheduler</span></a></li>
            <li class="nav-item"><a href="/dashboard/planner"><i class="material-icons">calendar_month</i><span>Planner</span></a></li>
            <li class="nav-item"><a href="/dashboard/courses"><i class="material-icons">library_books</i><span>Curriculum</span></a></li>
        </nav>
        <div style="margin-top: auto;">
            <li class="nav-item"><a href="javascript:void(0)" id="logoutBtn"><i class="material-icons">logout</i><span>Sign Out</span></a></li>
        </div>
    </aside>

    <main class="app-main">
        <header class="app-header">
            <div class="page-title"><h1>Internal Assessments</h1></div>
            <div class="user-profile" onclick="location.href='/dashboard/profile'" style="cursor: pointer;">
                <div class="user-avatar" id="userInitial">U</div>
                <div style="display: flex; flex-direction: column;">
                    <span id="userName" style="font-weight: 700; font-size: 0.9rem;">Portal User</span>
                    <span style="color: var(--accent-secondary); font-size: 0.75rem; font-weight: 700;">LIVE</span>
                </div>
            </div>
        </header>

        <section id="marksContent" class="animate-fade-in" style="display: flex; flex-direction: column; gap: 32px;">
            <!-- Groups will be inserted here -->
            <div style="text-align: center; padding: 40px;"><p style="color: var(--text-secondary);">Recalculating metrics...</p></div>
        </section>
    </main>

    <script>
        async function fetchMarks() {
            try {
                const userRes = await fetch('/api/trackit/sync/updateUserInfo', { method: 'POST' });
                const userData = await userRes.json();
                
                const marksRes = await fetch('/api/trackit/sync/updateMarks', { method: 'POST' });
                const marksData = await marksRes.json();

                const attRes = await fetch('/api/trackit/sync/updateAttendance', { method: 'POST' });
                const attData = await attRes.json();
                
                if (userData.userInfo) {
                    document.getElementById('userName').innerText = userData.userInfo.name || "User";
                    document.getElementById('userInitial').innerText = (userData.userInfo.name || "U")[0];
                }

                if (marksData.marks) {
                    const content = document.getElementById('marksContent');
                    
                    // Map course codes to titles
                    const courseMap = {};
                    if (attData.attendance) {
                        attData.attendance.forEach(c => {
                            courseMap[c.courseCode] = c.courseTitle;
                        });
                    }

                    content.innerHTML = marksData.marks.map(item => `
                        <div class="dashboard-card" style="padding: 0; overflow: hidden;">
                            <div style="padding: 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02);">
                                <div>
                                    <div style="font-weight: 800; color: var(--accent-primary);">${courseMap[item.course] || item.course}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">${item.course} • ${item.category} ASSESMENT</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 1.5rem; font-weight: 800;">${item.total.obtained} <span style="font-size: 0.9rem; color: var(--text-secondary);">/ ${item.total.maxMark}</span></div>
                                    <div style="font-size: 0.75rem; font-weight: 700; color: var(--accent-secondary);">${((item.total.obtained/item.total.maxMark)*100 || 0).toFixed(1)}% Score</div>
                                </div>
                            </div>
                            <div style="padding: 12px 24px;">
                                ${item.marks.map(m => `
                                    <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dotted var(--border-color);">
                                        <span style="font-weight: 600;">${m.exam}</span>
                                        <span style="font-family: 'JetBrains Mono'; font-weight: 700; color: ${m.obtained > (m.maxMark*0.5) ? 'var(--text-primary)' : 'var(--accent-danger)'}">${m.obtained} / ${m.maxMark}</span>
                                    </div>
                                `).join('') || '<div style="padding: 16px; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">No exam records found.</div>'}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) { console.error("Marks Fetch Error:", err); }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/trackit/auth/logout', { method: 'POST' });
            window.location.href = '/';
        });
        fetchMarks();
    </script>
</body>
</html>
